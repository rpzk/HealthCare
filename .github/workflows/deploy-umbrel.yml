# Deploy automático para UmbrelOS (minipc em produção)
# Fluxo: push main → build/test → SSH no Umbrel → pull + docker-compose up
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   UMBREL_SSH_HOST    - IP ou hostname do minipc (ex: 192.168.1.100 ou healthcare.seudominio.com)
#   UMBREL_SSH_USER    - Usuário SSH (ex: umbrel)
#   UMBREL_SSH_KEY     - Chave privada SSH (conteúdo do arquivo id_rsa ou id_ed25519)

name: Deploy to Umbrel

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite disparo manual

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/healthcare_test
          NEXTAUTH_SECRET: test-secret-for-build
          NEXTAUTH_URL: http://localhost:3000

  deploy:
    name: Deploy to Umbrel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UMBREL_SSH_KEY }}" > ~/.ssh/umbrel_key
          chmod 600 ~/.ssh/umbrel_key
          ssh-keyscan ${{ secrets.UMBREL_TAILSCALE_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/umbrel_key -o StrictHostKeyChecking=no ${{ secrets.UMBREL_SSH_USER }}@${{ secrets.UMBREL_TAILSCALE_IP }} << 'EOF'
            set -e
            cd /home/umbrel/HealthCare

            echo "📥 Pulling latest code..."
            git fetch origin main

            # Remove directories created by Docker that block git reset
            sudo rm -rf backups/ 2>/dev/null || true
            git reset --hard origin/main

            echo "🐳 Building and starting containers..."
            docker compose -f docker-compose.prod.yml build app --no-cache
            docker compose -f docker-compose.prod.yml up -d app

            echo "📦 Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate resolve --applied 20260120110000_add_invite_sensitive_fields 2>/dev/null || true
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy || true

            echo "✅ Deploy concluído!"
            docker compose -f docker-compose.prod.yml ps
          EOF

      - name: Health check
        run: |
          # Verificação básica - ajuste UMBREL_APP_URL se tiver URL pública
          if [ -n "${{ secrets.UMBREL_APP_URL }}" ]; then
            sleep 30
            curl -sf "${{ secrets.UMBREL_APP_URL }}/api/health" || echo "Health check skipped (no URL)"
          fi
